import os
import json
import sys
import traceback

print("--- STARTING DEBUG ---")

try:
    # 1. Check if API Key is visible
    key = os.environ.get("GEMINI_API_KEY")
    if not key:
        print("ERROR: GEMINI_API_KEY is empty or missing.")
        sys.exit(1)
    print("API Key found.")

    # 2. Check if products.json exists
    if not os.path.exists('products.json'):
        print("ERROR: products.json file not found in root folder.")
        sys.exit(1)
    
    # 3. Attempt to load JSON
    with open('products.json', 'r') as f:
        data = json.load(f)
        print("JSON loaded successfully.")

except Exception:
    print("--- CRITICAL FAILURE ---")
    traceback.print_exc() # This prints the exact error line
    sys.exit(2)
